<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novodo packages setup</title>
    <link rel="stylesheet" href="setup.css">
    <link rel="shortcut icon" href="favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="animation.css">
</head>
<body>
    <svg width="1" height="1" viewBox="0 0 1 1" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" class="bg-art">
        <path d="M1 0H0V1L1 0Z" fill="#71b51b"/>
    </svg>

    <form method="POST" class="form">
        <a href="/exit">
            <svg width="6" height="6" viewBox="0 0 6 6" fill="none" xmlns="http://www.w3.org/2000/svg" class="ext-arrow">
                <path d="M4 1L1 4M1 1L4 4" stroke="white"/>
            </svg>
        </a>

        <h1 class="page-title">Welcome to Novodo</h1>
        <h2 class="page-subtitle">software, redefined.</h2>
        <h1>Let's get you set up.</h1>
        <div class="buttons">
            <a href="tc" class="a">Start</a>
        </div>
    </form>

    <div id="video-overlay">
        <video id="startup-video" class="startup-video" autoplay muted playsinline>
            <source src="loading.mp4" type="video/mp4">
            Video is not supported.
        </video>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var video = document.getElementById("startup-video");
            var videoOverlay = document.getElementById("video-overlay");

            video.addEventListener("loadedmetadata", function() {
                video.requestFullscreen().then(function() {
                    video.play();
                }).catch(function(error) {
                    console.error("Error entering fullscreen mode:", error);
                });
            });

            const videoTimeout = setTimeout(hideVideo, 1500);
            var videoOverlay = document.getElementById("video-overlay");

            function disablePointerEventsOverlay() {
                videoOverlay.style.pointerEvents = 'None'
            }

            function hideVideo() {
                videoOverlay.style.opacity = 0
                const pointerTimeout = setTimeout(disablePointerEventsOverlay, 1000);
            }
        });
    </script>

    <script src="animation.js"></script>
</body>
</html>
